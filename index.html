<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>LalaDaily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', system-ui, sans-serif; }
        .mobile-container { max-width: 480px; margin: 0 auto; }
        .module-section { display: none; }
        .module-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="mobile-container min-h-screen bg-slate-950">
        <div class="bg-slate-900 border-b border-slate-700 px-4 py-4 sticky top-0 z-50">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-emerald-400">LalaDaily</h1>
                    <p class="text-sm text-slate-400">Lalamove + Personal Finance</p>
                </div>
                <div class="bg-emerald-900 text-emerald-400 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1">
                    <i class="fas fa-circle text-xs"></i>
                    <span>ออนไลน์</span>
                </div>
            </div>
        </div>

        <div class="px-4 pt-3 bg-slate-950 border-b border-slate-700">
            <div class="flex gap-2">
                <button class="flex-1 py-2.5 text-sm font-medium bg-emerald-600 text-white rounded-xl" onclick="switchModule('lalamove')">Lalamove</button>
                <button class="flex-1 py-2.5 text-sm font-medium bg-slate-700 text-slate-300 rounded-xl" onclick="switchModule('personal-finance')">Personal Finance</button>
            </div>
        </div>

        <div id="module-lalamove" class="module-section active px-4 pt-4 pb-24">
            <!-- Check-in Card -->
            <div class="mb-4 bg-slate-900 border border-slate-700 rounded-2xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-slate-400">เช็คอินวันนี้</div>
                        <div id="checkin-status" class="text-sm font-medium">ยังไม่ได้เช็คอิน</div>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-checkin" onclick="doCheckIn()" class="px-4 py-2 bg-emerald-600 active:bg-emerald-800 rounded-xl text-xs font-semibold flex items-center gap-1.5">
                            <i class="fas fa-play text-xs"></i> <span>เช็คอิน</span>
                        </button>
                        <button id="btn-checkout" onclick="doCheckOut()" class="px-4 py-2 bg-slate-700 active:bg-slate-600 rounded-xl text-xs font-semibold flex items-center gap-1.5">
                            <i class="fas fa-stop text-xs"></i> <span>เช็คเฮาท์</span>
                        </button>
                    </div>
                </div>
                <div id="checkin-duration" class="text-xs text-emerald-400 mt-2 hidden font-mono"></div>
            </div>

            <div class="mb-4">
                <h2 class="text-lg font-semibold mb-2 px-1">ภาพรวมวันนี้</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="bg-slate-900 border border-emerald-700 p-4 rounded-2xl">
                        <div class="text-sm text-emerald-400 mb-1">รายได้จริง</div>
                        <div class="text-3xl font-bold text-emerald-400" id="total-income">0</div>
                    </div>
                    <div class="bg-slate-900 border border-red-700 p-4 rounded-2xl">
                        <div class="text-sm text-red-400 mb-1">ค่าใช้จ่ายหัก</div>
                        <div class="text-3xl font-bold text-red-400" id="total-expense">0</div>
                    </div>
                </div>
                <div class="bg-emerald-900/30 border border-emerald-600 p-4 rounded-2xl">
                    <div class="text-sm text-emerald-400 mb-1">กำไรสุทธิจริง</div>
                    <div class="text-4xl font-bold text-emerald-400" id="real-net">0</div>
                </div>
            </div>

            <div class="mb-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="showIncomeModal()" class="bg-emerald-600 active:bg-emerald-800 text-white py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1">
                        <i class="fas fa-plus-circle text-xl"></i>
                        <span class="font-semibold text-sm">บันทึกงานใหม่</span>
                    </button>
                    <button onclick="showExpenseModal()" class="bg-red-600 active:bg-red-800 text-white py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1">
                        <i class="fas fa-minus-circle text-xl"></i>
                        <span class="font-semibold text-sm">ค่าใช้จ่าย</span>
                    </button>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-2 px-1">
                    <h3 class="text-sm font-medium text-slate-400">รายการวันนี้</h3>
                    <span class="text-xs text-slate-500" id="transaction-count">0 รายการ</span>
                </div>
                <div id="transactions-list" class="space-y-2.5"></div>
            </div>
        </div>

        <div id="module-personal-finance" class="module-section px-4 pt-8 pb-24 text-center">
            <i class="fas fa-wallet text-6xl text-slate-700 mb-4"></i>
            <h2 class="text-xl font-semibold mb-2">รายรับ-รายจ่ายส่วนตัว</h2>
            <p class="text-slate-400 text-sm">โมดูลนี้ยังอยู่ในการพัฒนา<br>จะเพิ่มเร็ว ๆ นี้</p>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-slate-900 border-t border-slate-700 px-4 py-2 z-50">
            <div class="flex justify-around">
                <button onclick="switchModule('lalamove')" class="flex flex-col items-center text-emerald-400 px-3 py-1">
                    <i class="fas fa-car text-xl"></i>
                    <span class="text-xs mt-0.5">Lalamove</span>
                </button>
                <button onclick="switchModule('personal-finance')" class="flex flex-col items-center text-slate-400 px-3 py-1">
                    <i class="fas fa-wallet text-xl"></i>
                    <span class="text-xs mt-0.5">Personal</span>
                </button>
                <button class="flex flex-col items-center text-slate-400 px-3 py-1">
                    <i class="fas fa-cog text-xl"></i>
                    <span class="text-xs mt-0.5">ตั้งค่า</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Income Modal -->
    <div id="income-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end">
        <div class="w-full max-w-[480px] mx-auto bg-slate-900 rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">บันทึกงานใหม่</h3>
                <button onclick="hideIncomeModal()" class="text-2xl text-slate-400">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">ระยะทาง (กม.)</label>
                    <input type="number" id="income-km" value="15" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">รายได้จากแอพ</label>
                        <input type="number" id="income-fare" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">ทิปจากลูกค้า</label>
                        <input type="number" id="income-tip" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">ค่าบริการ GP (หัก)</label>
                    <input type="number" id="income-gp" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">หมายเหตุ</label>
                    <input type="text" id="income-note" value="งานปกติ" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="hideIncomeModal()" class="flex-1 py-3.5 bg-slate-700 rounded-2xl font-semibold">ยกเลิก</button>
                <button onclick="saveIncome()" class="flex-1 py-3.5 bg-emerald-600 rounded-2xl font-semibold">บันทึกงาน</button>
            </div>
        </div>
    </div>

    <!-- Expense Modal -->
    <div id="expense-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end">
        <div class="w-full max-w-[480px] mx-auto bg-slate-900 rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">บันทึกค่าใช้จ่าย</h3>
                <button onclick="hideExpenseModal()" class="text-2xl text-slate-400">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">หมวดหมู่</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectCat(this,'น้ำมัน')" class="expense-cat-btn px-3 py-2.5 text-sm rounded-xl border border-slate-600 bg-slate-800">น้ำมัน</button>
                        <button onclick="selectCat(this,'อาหาร')" class="expense-cat-btn px-3 py-2.5 text-sm rounded-xl border border-slate-600 bg-slate-800">อาหาร</button>
                        <button onclick="selectCat(this,'อื่นๆ')" class="expense-cat-btn px-3 py-2.5 text-sm rounded-xl border border-slate-600 bg-slate-800">อื่นๆ</button>
                    </div>
                    <input type="hidden" id="expense-category">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">จำนวนเงิน (บาท)</label>
                    <input type="number" id="expense-amount" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">หมายเหตุ</label>
                    <input type="text" id="expense-note" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="hideExpenseModal()" class="flex-1 py-3.5 bg-slate-700 rounded-2xl font-semibold">ยกเลิก</button>
                <button onclick="saveExpense()" class="flex-1 py-3.5 bg-red-600 rounded-2xl font-semibold">บันทึก</button>
            </div>
        </div>
    </div>

    <script src="js/core/storage.js"></script>
    <script src="js/modules/lalamove/lalamove.js"></script>

    <script>
        // ==================== CHECK-IN (Fully self-contained) ====================
        function doCheckIn() {
            try {
                if (!window.LalamoveModule) {
                    alert('ระบบยังไม่พร้อม ลองรีเฟรชหน้าใหม่');
                    return;
                }

                const success = LalamoveModule.checkIn();
                if (success) {
                    // Update UI immediately - no dependency on other modules
                    const checkinData = LalamoveModule.getCheckinStatus();
                    const statusEl = document.getElementById('checkin-status');
                    const durationEl = document.getElementById('checkin-duration');

                    if (statusEl && checkinData.start) {
                        const startTime = new Date(checkinData.start).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                        statusEl.innerHTML = 'เริ่มงานเมื่อ <span class="font-semibold text-emerald-400">' + startTime + '</span>';
                    }

                    if (durationEl) {
                        durationEl.classList.remove('hidden');
                        durationEl.innerHTML = 'กำลังทำงาน...';
                    }

                    // Start live timer display
                    startDurationTimer();
                } else {
                    alert('คุณเช็คอินอยู่แล้ว');
                }
            } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาด: ' + err.message);
            }
        }

        function doCheckOut() {
            try {
                if (!window.LalamoveModule) return;

                const success = LalamoveModule.checkOut();
                if (success) {
                    const statusEl = document.getElementById('checkin-status');
                    const durationEl = document.getElementById('checkin-duration');

                    if (statusEl) statusEl.innerHTML = 'ยังไม่ได้เช็คอิน';
                    if (durationEl) durationEl.classList.add('hidden');

                    if (window.durationInterval) {
                        clearInterval(window.durationInterval);
                        window.durationInterval = null;
                    }
                }
            } catch (err) {
                console.error(err);
            }
        }

        function startDurationTimer() {
            if (window.durationInterval) clearInterval(window.durationInterval);

            window.durationInterval = setInterval(function() {
                try {
                    const checkinData = LalamoveModule.getCheckinStatus();
                    if (!checkinData.start || checkinData.end) {
                        clearInterval(window.durationInterval);
                        return;
                    }

                    const start = new Date(checkinData.start);
                    const now = new Date();
                    const diff = now - start;

                    const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                    const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');

                    const el = document.getElementById('checkin-duration');
                    if (el) {
                        el.innerHTML = 'ทำงานมาแล้ว <span class="font-mono">' + h + ':' + m + ':' + s + '</span>';
                        el.classList.remove('hidden');
                    }
                } catch (e) {}
            }, 1000);
        }

        // ==================== OTHER FUNCTIONS ====================
        function showIncomeModal() {
            document.getElementById('income-modal').classList.remove('hidden');
            document.getElementById('income-modal').classList.add('flex');
        }
        function hideIncomeModal() {
            document.getElementById('income-modal').classList.add('hidden');
        }
        function showExpenseModal() {
            document.getElementById('expense-modal').classList.remove('hidden');
            document.getElementById('expense-modal').classList.add('flex');
        }
        function hideExpenseModal() {
            document.getElementById('expense-modal').classList.add('hidden');
        }

        function selectCat(btn, cat) {
            document.getElementById('expense-category').value = cat;
            document.querySelectorAll('.expense-cat-btn').forEach(b => {
                b.classList.remove('bg-emerald-600', 'border-emerald-500');
                b.classList.add('bg-slate-800');
            });
            btn.classList.add('bg-emerald-600', 'border-emerald-500');
            btn.classList.remove('bg-slate-800');
        }

        function saveIncome() {
            if (!window.LalamoveModule) return;
            const fare = parseFloat(document.getElementById('income-fare').value) || 0;
            const tip = parseFloat(document.getElementById('income-tip').value) || 0;
            if (fare <= 0 && tip <= 0) {
                alert('กรุณาระบุรายได้');
                return;
            }
            LalamoveModule.addIncome({
                km: parseFloat(document.getElementById('income-km').value) || 0,
                fare: fare,
                tip: tip,
                gp: parseFloat(document.getElementById('income-gp').value) || 0,
                note: document.getElementById('income-note').value.trim()
            });
            hideIncomeModal();
            document.getElementById('income-fare').value = '';
            document.getElementById('income-tip').value = '';
            document.getElementById('income-gp').value = '';
            refreshSummary();
        }

        function saveExpense() {
            if (!window.LalamoveModule) return;
            const category = document.getElementById('expense-category').value;
            const amount = parseFloat(document.getElementById('expense-amount').value) || 0;
            if (!category) { alert('กรุณาเลือกหมวดหมู่'); return; }
            if (amount <= 0) { alert('กรุณาระบุจำนวนเงิน'); return; }
            LalamoveModule.addExpense({
                category: category,
                amount: amount,
                note: document.getElementById('expense-note').value.trim()
            });
            hideExpenseModal();
            document.getElementById('expense-amount').value = '';
            document.getElementById('expense-note').value = '';
            refreshSummary();
        }

        function refreshSummary() {
            if (!window.LalamoveModule) return;
            const s = LalamoveModule.calculateTodaySummary();
            document.getElementById('total-income').textContent = s.totalIncome.toLocaleString();
            document.getElementById('total-expense').textContent = s.totalExpense.toLocaleString();
            document.getElementById('real-net').textContent = s.net.toLocaleString();
            document.getElementById('transaction-count').textContent = s.count + ' รายการ';
        }

        function switchModule(name) {
            document.getElementById('module-lalamove').classList.toggle('active', name === 'lalamove');
            document.getElementById('module-personal-finance').classList.toggle('active', name === 'personal-finance');
        }

        // Init on load
        window.addEventListener('load', function() {
            if (window.LalamoveModule) {
                LalamoveModule.init();
                refreshSummary();

                // Restore check-in state if already checked in
                const status = LalamoveModule.getCheckinStatus();
                if (status.start && !status.end) {
                    doCheckIn(); // This will just update UI since already checked in? Wait, no - better way:
                    const statusEl = document.getElementById('checkin-status');
                    const startTime = new Date(status.start).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    statusEl.innerHTML = 'เริ่มงานเมื่อ <span class="font-semibold text-emerald-400">' + startTime + '</span>';
                    startDurationTimer();
                }
            }
        });
    </script>
</body>
</html>
