<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LalaDaily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', system-ui, sans-serif; }
        .mobile-container { max-width: 480px; margin: 0 auto; }
        .module-section { display: none; }
        .module-section.active { display: block; }
        .transaction-item { transition: all 0.2s ease; }
        .modal { animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="mobile-container min-h-screen bg-slate-950">
        <!-- Header -->
        <div class="bg-slate-900 border-b border-slate-700 px-4 py-4 sticky top-0 z-50">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-emerald-400">LalaDaily</h1>
                    <p class="text-sm text-slate-400">Lalamove + Personal Finance</p>
                </div>
                <div class="bg-emerald-900 text-emerald-400 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1">
                    <i class="fas fa-circle text-xs"></i>
                    <span>ออนไลน์</span>
                </div>
            </div>
        </div>

        <!-- Module Navigation -->
        <div class="px-4 pt-3 bg-slate-950 border-b border-slate-700">
            <div class="flex gap-2">
                <button id="nav-lalamove" class="flex-1 py-2.5 text-sm font-medium bg-emerald-600 text-white rounded-xl">Lalamove</button>
                <button id="nav-personal-finance" class="flex-1 py-2.5 text-sm font-medium bg-slate-700 text-slate-300 rounded-xl">Personal Finance</button>
            </div>
        </div>

        <!-- LALAMOVE MODULE -->
        <div id="module-lalamove" class="module-section active px-4 pt-4 pb-20">
            <!-- Check-in Card -->
            <div class="mb-4 bg-slate-900 border border-slate-700 rounded-2xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-slate-400">เช็คอินวันนี้</div>
                        <div id="checkin-status" class="text-sm font-medium">ยังไม่ได้เช็คอิน</div>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-checkin" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-xl text-xs font-semibold flex items-center gap-1.5">
                            <i class="fas fa-play text-xs"></i> <span>เช็คอิน</span>
                        </button>
                        <button id="btn-checkout" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs font-semibold flex items-center gap-1.5">
                            <i class="fas fa-stop text-xs"></i> <span>เช็คเฮาท์</span>
                        </button>
                    </div>
                </div>
                <div id="checkin-duration" class="text-xs text-emerald-400 mt-2 hidden font-mono"></div>
            </div>

            <!-- Summary -->
            <div class="mb-4">
                <div class="flex items-center justify-between mb-2 px-1">
                    <h2 class="text-lg font-semibold">ภาพรวมวันนี้</h2>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="bg-slate-900 border border-emerald-700 p-4 rounded-2xl">
                        <div class="text-sm text-emerald-400 mb-1">รายได้จริง</div>
                        <div class="text-3xl font-bold text-emerald-400" id="total-income">0</div>
                    </div>
                    <div class="bg-slate-900 border border-red-700 p-4 rounded-2xl">
                        <div class="text-sm text-red-400 mb-1">ค่าใช้จ่ายหัก</div>
                        <div class="text-3xl font-bold text-red-400" id="total-expense">0</div>
                    </div>
                </div>
                <div class="bg-emerald-900/30 border border-emerald-600 p-4 rounded-2xl">
                    <div class="text-sm text-emerald-400 mb-1">กำไรสุทธิจริง</div>
                    <div class="text-4xl font-bold text-emerald-400" id="real-net">0</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="mb-4">
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-add-income" class="bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1">
                        <i class="fas fa-plus-circle text-xl"></i>
                        <span class="font-semibold text-sm">บันทึกงานใหม่</span>
                    </button>
                    <button id="btn-add-expense" class="bg-red-600 hover:bg-red-700 text-white py-3.5 rounded-2xl flex flex-col items-center justify-center gap-1">
                        <i class="fas fa-minus-circle text-xl"></i>
                        <span class="font-semibold text-sm">ค่าใช้จ่าย</span>
                    </button>
                </div>
            </div>

            <!-- Transactions List -->
            <div>
                <div class="flex items-center justify-between mb-2 px-1">
                    <h3 class="text-sm font-medium text-slate-400">รายการวันนี้</h3>
                    <span class="text-xs text-slate-500" id="transaction-count">0 รายการ</span>
                </div>
                <div id="transactions-list" class="space-y-2.5"></div>
            </div>
        </div>

        <!-- PERSONAL FINANCE MODULE -->
        <div id="module-personal-finance" class="module-section px-4 pt-8 pb-20 text-center">
            <i class="fas fa-wallet text-6xl text-slate-700 mb-4"></i>
            <h2 class="text-xl font-semibold mb-2">รายัป-รายจ่ายส่วนตัว</h2>
            <p class="text-slate-400 text-sm">โมดูลนี้ยังอยู่ในการพัฒนา<br>จะเพิ่มเร็ือๆ นี้</p>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-slate-900 border-t border-slate-700 px-4 py-2 z-50">
            <div class="flex justify-around">
                <button onclick="Router.navigate('lalamove')" class="flex flex-col items-center text-emerald-400 px-3 py-1">
                    <i class="fas fa-car text-xl"></i>
                    <span class="text-xs mt-0.5">Lalamove</span>
                </button>
                <button onclick="Router.navigate('personal-finance')" class="flex flex-col items-center text-slate-400 px-3 py-1">
                    <i class="fas fa-wallet text-xl"></i>
                    <span class="text-xs mt-0.5">Personal</span>
                </button>
                <button class="flex flex-col items-center text-slate-400 px-3 py-1">
                    <i class="fas fa-cog text-xl"></i>
                    <span class="text-xs mt-0.5">ตั้งค่า</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Income Modal -->
    <div id="income-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end">
        <div class="w-full max-w-[480px] mx-auto bg-slate-900 rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">บันทึกงานใหม่</h3>
                <button id="btn-close-income" class="text-2xl text-slate-400">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">ระยะทาง (กม.)</label>
                    <input type="number" id="income-km" value="15" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">รายได้จากแอพ</label>
                        <input type="number" id="income-fare" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">ทิปจากลูกค้า</label>
                        <input type="number" id="income-tip" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">ค่าบริการ GP</label>
                    <input type="number" id="income-gp" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">หมายเหตุ</label>
                    <input type="text" id="income-note" value="งานปกติ" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button id="btn-cancel-income" class="flex-1 py-3.5 bg-slate-700 hover:bg-slate-600 rounded-2xl font-semibold">ยกเลิก</button>
                <button id="btn-save-income" class="flex-1 py-3.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold">บันทึกงาน</button>
            </div>
        </div>
    </div>

    <!-- Expense Modal -->
    <div id="expense-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end">
        <div class="w-full max-w-[480px] mx-auto bg-slate-900 rounded-t-3xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">บันทึกค่าใช้จ่าย</h3>
                <button id="btn-close-expense" class="text-2xl text-slate-400">&times;</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">หมวดหมู่</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button class="expense-cat-btn px-3 py-2.5 text-sm rounded-xl border border-slate-600 bg-slate-800" data-category="น้ำมัน">น้ำมัน</button>
                        <button class="expense-cat-btn px-3 py-2.5 text-sm rounded-xl border border-slate-600 bg-slate-800" data-category="อาหาร">อาหาร</button>
                        <button class="expense-cat-btn px-3 py-2.5 text-sm rounded-xl border border-slate-600 bg-slate-800" data-category="อื่นๆ">อื่นๆ</button>
                    </div>
                    <input type="hidden" id="expense-category">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">จำนวนเงิน (บท)</label>
                    <input type="number" id="expense-amount" placeholder="0" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">หมายเหตุ</label>
                    <input type="text" id="expense-note" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button id="btn-cancel-expense" class="flex-1 py-3.5 bg-slate-700 hover:bg-slate-600 rounded-2xl font-semibold">ยกเลิก</button>
                <button id="btn-save-expense" class="flex-1 py-3.5 bg-red-600 hover:bg-red-700 rounded-2xl font-semibold">บันทึก</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/core/event-bus.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/router.js"></script>
    <script src="js/core/app.js"></script>
    <script src="js/modules/lalamove/lalamove.js"></script>
    <script src="js/modules/lalamove/lalamove-ui.js"></script>

    <script>
        let records = [];
        let checkin = { start: null, end: null };
        let selectedExpenseCategory = '';

        function loadData() {
            const saved = localStorage.getItem('lalamove_records');
            if (saved) records = JSON.parse(saved);
            const c = localStorage.getItem('lalamove_checkin');
            if (c) checkin = JSON.parse(c);
        }

        function saveData() {
            localStorage.setItem('lalamove_records', JSON.stringify(records));
            localStorage.setItem('lalamove_checkin', JSON.stringify(checkin));
        }

        function updateSummary() {
            const today = new Date().toISOString().split('T')[0];
            const todayRecords = records.filter(r => r.date === today);
            
            let totalIncome = 0, totalExpense = 0;
            todayRecords.forEach(r => {
                if (r.type === 'income') totalIncome += r.amount;
                else totalExpense += r.amount;
            });

            document.getElementById('total-income').textContent = totalIncome.toLocaleString();
            document.getElementById('total-expense').textContent = totalExpense.toLocaleString();
            
            const net = totalIncome - totalExpense;
            const netEl = document.getElementById('real-net');
            netEl.textContent = net.toLocaleString();
            netEl.style.color = net >= 0 ? '#10b981' : '#f87171';
            
            document.getElementById('transaction-count').textContent = todayRecords.length + ' รายการ';
        }

        function renderTransactions() {
            const container = document.getElementById('transactions-list');
            const today = new Date().toISOString().split('T')[0];
            const list = records.filter(r => r.date === today).sort((a,b) => b.id - a.id);

            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">ยังไม่มีรายการวันนี้</div>`;
                return;
            }

            list.forEach(record => {
                const div = document.createElement('div');
                div.className = 'transaction-item flex items-center justify-between p-4 bg-slate-800 rounded-2xl border border-slate-700';
                const icon = record.type === 'income' ? '<i class="fas fa-arrow-up text-emerald-400"></i>' : '<i class="fas fa-arrow-down text-red-400"></i>';
                const color = record.type === 'income' ? 'text-emerald-400' : 'text-red-400';

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-700">${icon}</div>
                        <div>
                            <div class="font-medium">งานลาล่ามูฟ</div>
                            <div class="text-xs text-slate-400">รายได้ ${record.fare || 0} | ทิป ${record.tip || 0}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-semibold ${color}">${record.type === 'income' ? '+' : '-'}${record.amount.toLocaleString()}</div>
                        <div class="text-xs text-slate-500">เวลา ${record.time}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateCheckin() {
            const statusEl = document.getElementById('checkin-status');
            const durationEl = document.getElementById('checkin-duration');

            if (!checkin.start) {
                statusEl.innerHTML = 'ยังไม่ได้เช็คอิน';
                durationEl.classList.add('hidden');
                return;
            }

            const startTime = new Date(checkin.start).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
            statusEl.innerHTML = `เริ่มงานเมื่อ <span class="font-semibold text-emerald-400">${startTime}</span>`;
            durationEl.classList.remove('hidden');
            durationEl.innerHTML = 'กำลังทำงาน...';
        }

        function checkIn() {
            checkin.start = new Date().toISOString();
            checkin.end = null;
            saveData();
            updateCheckin();
        }

        function checkOut() {
            if (!checkin.start) return;
            checkin.end = new Date().toISOString();
            saveData();
            updateCheckin();
        }

        function showIncomeModal() {
            document.getElementById('income-modal').classList.remove('hidden');
            document.getElementById('income-modal').classList.add('flex');
        }

        function hideIncomeModal() {
            document.getElementById('income-modal').classList.remove('flex');
            document.getElementById('income-modal').classList.add('hidden');
        }

        function showExpenseModal() {
            selectedExpenseCategory = '';
            document.getElementById('expense-category').value = '';
            document.querySelectorAll('.expense-cat-btn').forEach(btn => btn.classList.remove('active', 'bg-emerald-600', 'border-emerald-500'));
            document.getElementById('expense-modal').classList.remove('hidden');
            document.getElementById('expense-modal').classList.add('flex');
        }

        function hideExpenseModal() {
            document.getElementById('expense-modal').classList.remove('flex');
            document.getElementById('expense-modal').classList.add('hidden');
        }

        function saveIncome() {
            const km = parseFloat(document.getElementById('income-km').value) || 0;
            const fare = parseFloat(document.getElementById('income-fare').value) || 0;
            const tip = parseFloat(document.getElementById('income-tip').value) || 0;
            const gp = parseFloat(document.getElementById('income-gp').value) || 0;
            const note = document.getElementById('income-note').value.trim();

            if (fare <= 0 && tip <= 0) {
                alert('กรุณาระบุรายได้');
                return;
            }

            records.push({
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                time: new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}),
                type: 'income',
                category: 'งานลาล่ามูฟ',
                fare: fare,
                tip: tip,
                gp: gp,
                amount: fare + tip,
                km: km,
                note: note
            });

            saveData();
            updateSummary();
            renderTransactions();
            hideIncomeModal();
            
            // Clear form
            document.getElementById('income-fare').value = '';
            document.getElementById('income-tip').value = '';
            document.getElementById('income-gp').value = '';
        }

        function saveExpense() {
            const category = document.getElementById('expense-category').value || selectedExpenseCategory;
            const amount = parseFloat(document.getElementById('expense-amount').value) || 0;
            const note = document.getElementById('expense-note').value.trim();

            if (!category) {
                alert('กรุณาเลือกหมวดหมู่');
                return;
            }
            if (amount <= 0) {
                alert('กรุณาระบุจำนวนเงิน');
                return;
            }

            records.push({
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                time: new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}),
                type: 'expense',
                category: category,
                amount: amount,
                note: note
            });

            saveData();
            updateSummary();
            renderTransactions();
            hideExpenseModal();
            
            // Clear form
            document.getElementById('expense-amount').value = '';
            document.getElementById('expense-note').value = '';
        }

        function initializeExpenseCategoryButtons() {
            document.querySelectorAll('.expense-cat-btn').forEach(btn => {
                btn.onclick = () => {
                    selectedExpenseCategory = btn.dataset.category;
                    document.getElementById('expense-category').value = selectedExpenseCategory;
                    
                    document.querySelectorAll('.expense-cat-btn').forEach(b => b.classList.remove('active', 'bg-emerald-600', 'border-emerald-500'));
                    btn.classList.add('active', 'bg-emerald-600', 'border-emerald-500');
                };
            });
        }

        function initializeApp() {
            loadData();
            updateSummary();
            renderTransactions();
            updateCheckin();
            initializeExpenseCategoryButtons();

            // Check-in
            document.getElementById('btn-checkin').onclick = checkIn;
            document.getElementById('btn-checkout').onclick = checkOut;

            // Income Modal
            document.getElementById('btn-add-income').onclick = showIncomeModal;
            document.getElementById('btn-close-income').onclick = hideIncomeModal;
            document.getElementById('btn-cancel-income').onclick = hideIncomeModal;
            document.getElementById('btn-save-income').onclick = saveIncome;

            // Expense Modal
            document.getElementById('btn-add-expense').onclick = showExpenseModal;
            document.getElementById('btn-close-expense').onclick = hideExpenseModal;
            document.getElementById('btn-cancel-expense').onclick = hideExpenseModal;
            document.getElementById('btn-save-expense').onclick = saveExpense;

            // Close modal when clicking outside
            document.getElementById('income-modal').onclick = (e) => {
                if (e.target.id === 'income-modal') hideIncomeModal();
            };
            document.getElementById('expense-modal').onclick = (e) => {
                if (e.target.id === 'expense-modal') hideExpenseModal();
            };

            // Router
            if (window.Router) {
                window.Router.register('lalamove', {
                    show: () => {
                        document.getElementById('module-lalamove').classList.add('active');
                        document.getElementById('module-personal-finance').classList.remove('active');
                    },
                    hide: () => {
                        document.getElementById('module-lalamove').classList.remove('active');
                    }
                });

                window.Router.register('personal-finance', {
                    show: () => {
                        document.getElementById('module-lalamove').classList.remove('active');
                        document.getElementById('module-personal-finance').classList.add('active');
                    },
                    hide: () => {
                        document.getElementById('module-personal-finance').classList.remove('active');
                    }
                });
            }

            document.getElementById('nav-lalamove').onclick = () => window.Router && window.Router.navigate('lalamove');
            document.getElementById('nav-personal-finance').onclick = () => window.Router && window.Router.navigate('personal-finance');

            console.log('%c[LalaDaily] App ready with working modals', 'color:#10b981');
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
